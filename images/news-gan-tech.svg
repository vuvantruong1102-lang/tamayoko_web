<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Minh họa công nghệ GaN so với silicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f4f2"/>
      <stop offset="100%" stop-color="#ebe9e5"/>
    </linearGradient>
    <linearGradient id="ganChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC143B"/>
      <stop offset="100%" stop-color="#a30f2c"/>
    </linearGradient>
    <linearGradient id="siChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c8c5bf"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
        font-size="32" font-weight="800" fill="#1a1a1a" letter-spacing="-0.02em">
    Gallium Nitride vs Silicon
  </text>
  <text x="600" y="115" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="13" fill="#666" letter-spacing="0.1em">SAME POWER · 60% SMALLER · 40% COOLER</text>

  <!-- LEFT: Silicon chip (big) -->
  <g transform="translate(220, 200)">
    <text x="120" y="-20" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="13" fill="#666" letter-spacing="0.12em">SILICON · 65W</text>
    <rect x="0" y="0" width="240" height="280" rx="8" fill="url(#siChip)"/>
    <!-- chip pins -->
    <g fill="#999">
      <rect x="-6" y="30" width="6" height="8"/>
      <rect x="-6" y="60" width="6" height="8"/>
      <rect x="-6" y="90" width="6" height="8"/>
      <rect x="-6" y="120" width="6" height="8"/>
      <rect x="-6" y="150" width="6" height="8"/>
      <rect x="-6" y="180" width="6" height="8"/>
      <rect x="-6" y="210" width="6" height="8"/>
      <rect x="-6" y="240" width="6" height="8"/>
      <rect x="240" y="30" width="6" height="8"/>
      <rect x="240" y="60" width="6" height="8"/>
      <rect x="240" y="90" width="6" height="8"/>
      <rect x="240" y="120" width="6" height="8"/>
      <rect x="240" y="150" width="6" height="8"/>
      <rect x="240" y="180" width="6" height="8"/>
      <rect x="240" y="210" width="6" height="8"/>
      <rect x="240" y="240" width="6" height="8"/>
    </g>
    <!-- chip label -->
    <text x="120" y="155" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="56" font-weight="800" fill="#fff" opacity="0.4">Si</text>
    <!-- heat waves -->
    <g stroke="#e85d4d" stroke-width="3" fill="none" opacity="0.8">
      <path d="M 60 -40 Q 60 -50 70 -50 Q 80 -50 80 -60"/>
      <path d="M 120 -40 Q 120 -50 130 -50 Q 140 -50 140 -60"/>
      <path d="M 180 -40 Q 180 -50 190 -50 Q 200 -50 200 -60"/>
    </g>
    <!-- stats -->
    <text x="120" y="320" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="11" fill="#999" letter-spacing="0.1em">SIZE · 100% · TEMP · ~75°C</text>
  </g>

  <!-- ARROW -->
  <g transform="translate(560, 340)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#1a1a1a" stroke-width="3"/>
    <polyline points="70,-10 80,0 70,10" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- RIGHT: GaN chip (small) -->
  <g transform="translate(740, 280)">
    <text x="60" y="-20" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="13" fill="#DC143B" letter-spacing="0.12em">GaN · 65W</text>
    <rect x="0" y="0" width="120" height="140" rx="6" fill="url(#ganChip)"/>
    <!-- chip pins -->
    <g fill="#ff6b8a">
      <rect x="-5" y="20" width="5" height="6"/>
      <rect x="-5" y="40" width="5" height="6"/>
      <rect x="-5" y="60" width="5" height="6"/>
      <rect x="-5" y="80" width="5" height="6"/>
      <rect x="-5" y="100" width="5" height="6"/>
      <rect x="-5" y="120" width="5" height="6"/>
      <rect x="120" y="20" width="5" height="6"/>
      <rect x="120" y="40" width="5" height="6"/>
      <rect x="120" y="60" width="5" height="6"/>
      <rect x="120" y="80" width="5" height="6"/>
      <rect x="120" y="100" width="5" height="6"/>
      <rect x="120" y="120" width="5" height="6"/>
    </g>
    <text x="60" y="85" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
          font-size="38" font-weight="800" fill="#fff" opacity="0.5">GaN</text>
    <!-- stats -->
    <text x="60" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace"
          font-size="11" fill="#666" letter-spacing="0.1em">SIZE · 40% · TEMP · ~45°C</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(0, 580)">
    <text x="340" y="0" text-anchor="middle" font-family="Be Vietnam Pro, sans-serif"
          font-size="15" fill="#1a1a1a">Sạc silicon truyền thống · cồng kềnh · nóng</text>
    <text x="800" y="0" text-anchor="middle" font-family="Be Vietnam Pro, sans-serif"
          font-size="15" fill="#1a1a1a" font-weight="600">Sạc GaN hiện đại · nhỏ gọn · mát</text>
  </g>
</svg>
